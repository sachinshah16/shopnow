{% extends 'base.html' %}

{% block title %}Login{% endblock %}

{% block content %}
<div class="container mt-5 mb-5">
    <div class="row justify-content-center">
        <div class="col-md-5 col-lg-4">
            <div class="auth-card">
                <div class="text-center mb-4">
                    <div class="auth-icon">
                        <i class="bi bi-box-arrow-in-right"></i>
                    </div>
                    <h4 class="fw-bold">Welcome Back</h4>
                    <p class="text-muted small">Login to your ShopNow account</p>
                </div>

                <form method="POST">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label small fw-semibold">Username</label>
                        <input type="text" name="username" class="form-control" placeholder="Enter your username" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label small fw-semibold">Password</label>
                        <input type="password" name="password" class="form-control" placeholder="Enter your password" required>
                    </div>
                    <button type="submit" class="btn btn-shopnow w-100 mt-2">
                        <i class="bi bi-box-arrow-in-right me-2"></i>Login
                    </button>
                </form>

                <div class="text-center mt-3">
                    <p class="text-muted small">Don't have an account?</p>
                    <a href="{% url 'users:register_customer' %}" class="btn btn-outline-shopnow btn-sm me-2">Customer</a>
                    <a href="{% url 'users:register_vendor' %}" class="btn btn-outline-shopnow btn-sm">Vendor</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
