{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShopNow | Hyperlocal Fashion</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Poppins', sans-serif; }
        .splash-screen {
            min-height: 100vh;
            background: #E23744;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }
        .splash-logo {
            animation: splashFadeIn 0.8s ease-out;
            z-index: 10;
        }
        .splash-bag {
            width: 110px;
            height: 110px;
            background: white;
            border-radius: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 28px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.15);
        }
        .splash-bag i {
            font-size: 3.2rem;
            color: #E23744;
        }
        .splash-title {
            color: white;
            font-size: 3.2rem;
            font-weight: 800;
            letter-spacing: 1px;
            margin-bottom: 4px;
            z-index: 10;
            animation: splashFadeIn 0.8s ease-out 0.3s both;
        }
        .splash-tagline {
            color: rgba(255,255,255,0.9);
            font-size: 1.05rem;
            font-weight: 400;
            z-index: 10;
            margin-bottom: 8px;
            animation: splashFadeIn 0.8s ease-out 0.45s both;
        }
        .splash-subtitle {
            color: rgba(255,255,255,0.7);
            font-size: 0.9rem;
            font-weight: 400;
            z-index: 10;
            position: absolute;
            bottom: 40px;
            left: 40px;
            animation: splashFadeIn 0.8s ease-out 0.6s both;
        }
        .splash-subtitle strong { font-weight: 600; color: rgba(255,255,255,0.9); }
        .splash-cta {
            margin-top: 48px;
            z-index: 10;
            animation: splashFadeIn 0.8s ease-out 0.9s both;
        }
        .splash-cta a {
            display: inline-block;
            background: white;
            color: #E23744;
            padding: 16px 56px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 700;
            font-size: 1.1rem;
            box-shadow: 0 4px 24px rgba(0,0,0,0.15);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .splash-cta a:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 8px 32px rgba(0,0,0,0.25);
        }
        .splash-wave {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            pointer-events: none;
            opacity: 0.08;
            z-index: 1;
        }
        @keyframes splashFadeIn {
            from { opacity: 0; transform: translateY(24px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="splash-screen">
        <div class="splash-logo">
            <div class="splash-bag">
                <i class="bi bi-bag-fill"></i>
            </div>
        </div>
        <div class="splash-title">ShopNow</div>
        <div class="splash-tagline">Your Local Fashion Destination</div>
        <div class="splash-cta">
            {% if user.is_authenticated %}
                <a href="{% url 'users:dashboard' %}">Start Shopping</a>
            {% else %}
                <a href="{% url 'products:home' %}">Start Shopping</a>
            {% endif %}
        </div>
        <div class="splash-subtitle">Powered by <strong>VindhyaTech</strong></div>
        <svg class="splash-wave" viewBox="0 0 1440 320" fill="white">
            <path d="M0,224L48,213.3C96,203,192,181,288,181.3C384,181,480,203,576,224C672,245,768,267,864,250.7C960,235,1056,181,1152,165.3C1248,149,1344,171,1392,181.3L1440,192L1440,320L0,320Z"></path>
        </svg>
    </div>

    <script>
        setTimeout(function() {
            {% if user.is_authenticated %}
                window.location.href = "{% url 'users:dashboard' %}";
            {% else %}
                window.location.href = "{% url 'products:home' %}";
            {% endif %}
        }, 2000);
    </script>
</body>
</html>
